services:
  - type: web
    name: rtsl-ai
    runtime: python
    region: oregon
    plan: free
    pythonVersion: 3.11.0
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: TF_CPP_MIN_LOG_LEVEL
        value: "3"
