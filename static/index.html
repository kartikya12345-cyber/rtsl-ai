<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RTSL AI | Sign In</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .auth-page {
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            padding: 24px; position: relative;
            background: linear-gradient(135deg, #0a1628, #0d1b2a, #0f1d30);
            transition: background 0.4s ease;
        }
        body.light-mode .auth-page {
            background: linear-gradient(135deg, #eef2f7, #f0f4ff, #e8f0fe);
        }
        .auth-card {
            width: 100%; max-width: 430px; position: relative; z-index: 2;
            background: #ffffff; border-radius: 28px; padding: 44px 40px 36px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.35), 0 8px 20px rgba(0,0,0,0.2);
            animation: scaleIn 0.4s ease;
        }
        body.light-mode .auth-card {
            background: #ffffff;
            box-shadow: 0 10px 50px rgba(0,0,0,0.08), 0 2px 8px rgba(0,0,0,0.04);
        }
        .theme-toggle {
            position: absolute; top: 16px; right: 16px; z-index: 10;
            width: 38px; height: 38px; border-radius: 12px; border: none;
            background: rgba(0,0,0,0.06); color: #64748b; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem; transition: all 0.25s ease;
        }
        body.light-mode .theme-toggle { background: rgba(0,0,0,0.04); }
        .theme-toggle:hover { background: rgba(0,0,0,0.1); color: #1e293b; }
        .auth-brand {
            text-align: center; font-size: 1.6rem; font-weight: 900; margin-bottom: 28px;
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }
        .auth-header { text-align: center; margin-bottom: 28px; }
        .auth-header h1 {
            font-size: 1.65rem; font-weight: 800; color: #0f172a; margin-bottom: 6px;
            letter-spacing: -0.3px;
        }
        .auth-header p { color: #64748b; font-size: 0.88rem; line-height: 1.5; }
        .auth-tabs {
            display: flex; gap: 4px; background: #f1f5f9; padding: 4px;
            border-radius: 14px; margin-bottom: 28px;
        }
        body.light-mode .auth-tabs { background: #f1f5f9; }
        .auth-tab {
            flex: 1; padding: 10px 16px; border: none; border-radius: 11px;
            font-size: 0.85rem; font-weight: 600; color: #64748b; cursor: pointer;
            transition: all 0.25s ease; background: transparent;
            font-family: inherit;
        }
        .auth-tab:hover { color: #334155; }
        .auth-tab.active {
            background: #ffffff; color: #0072ff; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .auth-form { margin-bottom: 4px; }
        .auth-form .form-group { margin-bottom: 20px; }
        .auth-form .form-group label {
            display: block; font-size: 0.82rem; font-weight: 600;
            color: #334155; margin-bottom: 7px;
        }
        .auth-form .form-input {
            width: 100%; padding: 12px 16px; border: 1.5px solid #e2e8f0;
            border-radius: 14px; color: #0f172a; font-family: inherit;
            font-size: 0.9rem; outline: none; transition: all 0.25s ease;
            background: #f8fafc; box-sizing: border-box;
        }
        .auth-form .form-input:focus {
            border-color: #0072ff; background: #ffffff;
            box-shadow: 0 0 0 4px rgba(0,114,255,0.1);
        }
        .auth-form .form-input::placeholder { color: #94a3b8; }
        .password-wrapper { position: relative; }
        .password-toggle {
            position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
            background: none; border: none; color: #94a3b8; cursor: pointer;
            font-size: 1rem; padding: 4px; transition: color 0.2s;
        }
        .password-toggle:hover { color: #0072ff; }
        .password-strength {
            display: none; margin-top: -12px; margin-bottom: 20px;
        }
        .password-strength.show { display: block; }
        .strength-bar {
            height: 4px; background: #e2e8f0; border-radius: 4px;
            overflow: hidden; margin-bottom: 6px;
        }
        .strength-fill {
            height: 100%; width: 0%; border-radius: 4px;
            transition: width 0.3s ease, background 0.3s ease;
        }
        .strength-text { font-size: 0.75rem; font-weight: 600; color: #64748b; }
        .form-options {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 24px; margin-top: -4px;
        }
        .checkbox-label {
            display: flex; align-items: center; gap: 8px;
            font-size: 0.85rem; color: #475569; cursor: pointer; font-weight: 500;
        }
        .checkbox-label input[type="checkbox"] {
            width: 17px; height: 17px; accent-color: #0072ff;
            border-radius: 5px; cursor: pointer;
        }
        .forgot-link {
            font-size: 0.85rem; color: #0072ff; font-weight: 600;
            text-decoration: none; cursor: pointer;
        }
        .forgot-link:hover { text-decoration: underline; }
        .btn-auth {
            width: 100%; padding: 14px 24px; border: none; border-radius: 16px;
            font-family: inherit; font-size: 0.95rem; font-weight: 700; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: all 0.3s ease; position: relative; overflow: hidden;
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            color: #ffffff; box-shadow: 0 4px 20px rgba(0,114,255,0.3);
            letter-spacing: 0.3px;
        }
        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0,114,255,0.4);
        }
        .btn-auth:active { transform: translateY(0); }
        .btn-auth.btn-loading { pointer-events: none; opacity: 0.8; }
        .auth-footer {
            text-align: center; margin-top: 24px; padding-top: 20px;
            border-top: 1px solid #f1f5f9;
            font-size: 0.88rem; color: #64748b;
        }
        .auth-footer a {
            color: #0072ff; font-weight: 700; text-decoration: none; cursor: pointer;
        }
        .auth-footer a:hover { text-decoration: underline; }
        #forgot-row { display: flex; }
        .field-hidden { display: none !important; }
        @media (max-width: 500px) {
            .auth-card { padding: 32px 24px 28px; border-radius: 24px; }
            .auth-header h1 { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
    <div class="auth-page" id="auth-page">
        <div class="auth-card">
            <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
                <i class="fas fa-moon" id="theme-icon"></i>
            </button>
            <div class="auth-brand">RTSL AI</div>
            <div class="auth-header">
                <h1 id="auth-title">Welcome Back</h1>
                <p id="auth-subtitle">Sign in to continue your sign language detection journey</p>
            </div>
            <div class="auth-tabs" id="auth-tabs">
                <button class="auth-tab active" data-tab="username" id="tab-username">Username</button>
                <button class="auth-tab" data-tab="email" id="tab-email">Email</button>
            </div>
            <form class="auth-form" id="auth-form" autocomplete="off">
                <div class="form-group" id="username-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" class="form-input" placeholder="Enter your username" autocomplete="username">
                </div>
                <div class="form-group field-hidden" id="email-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" class="form-input" placeholder="Enter your email" autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" class="form-input" placeholder="Enter your password" autocomplete="current-password">
                        <button type="button" class="password-toggle" id="toggle-pw" tabindex="-1">
                            <i class="far fa-eye"></i>
                        </button>
                    </div>
                </div>
                <div class="form-group field-hidden" id="confirm-group">
                    <label for="confirm-password">Confirm Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="confirm-password" class="form-input" placeholder="Confirm your password" autocomplete="new-password">
                        <button type="button" class="password-toggle" id="toggle-cpw" tabindex="-1">
                            <i class="far fa-eye"></i>
                        </button>
                    </div>
                </div>
                <div class="password-strength" id="password-strength">
                    <div class="strength-bar">
                        <div class="strength-fill" id="strength-fill"></div>
                    </div>
                    <span class="strength-text" id="strength-text"></span>
                </div>
                <div class="form-options" id="forgot-row">
                    <label class="checkbox-label">
                        <input type="checkbox" id="remember-me" checked> Remember Me
                    </label>
                    <a class="forgot-link" id="forgot-link">Forgot Password?</a>
                </div>
                <button type="submit" class="btn-auth" id="auth-btn">
                    <span id="btn-text">Sign In</span>
                    <i class="fas fa-arrow-right" id="btn-icon"></i>
                </button>
            </form>
            <div class="auth-footer">
                <span id="toggle-text">Don't have an account?</span>
                <a id="toggle-link">Create Account</a>
            </div>
        </div>
    </div>
    <div class="toast-container" id="toast-container"></div>
    <script>
        if (window.location.search.includes('signup=1')) {
            document.addEventListener('DOMContentLoaded', () => {
                const link = document.getElementById('toggle-link');
                if (link) link.click();
            });
        }
    </script>
    <script src="js/auth.js"></script>
</body>
</html>
